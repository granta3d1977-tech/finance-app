<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Finance App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f6fa; }
        .card { border-radius: 15px; }

        .clock {
            width: 100px;
            height: 100px;
            border: 5px solid #ccc;
            border-radius: 50%;
            position: relative;
            background: #f8f8f8;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transform: translateX(-50%);
        }

        .hour { width: 4px; height: 25px; background: black; }
        .minute { width: 3px; height: 35px; background: black; }
        .second { width: 2px; height: 40px; background: orange; }

        .center-dot {
            width: 8px;
            height: 8px;
            background: black;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .number {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
        }

        .n12 { top: 5px; left: 50%; transform: translateX(-50%); }
        .n3  { right: 5px; top: 50%; transform: translateY(-50%); }
        .n6  { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .n9  { left: 5px; top: 50%; transform: translateY(-50%); }
    </style>
</head>

<body class="container py-4">

<!-- ШАПКА -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>💰 Финансы</h2>

    <div class="d-flex align-items-center gap-3">
        <div id="date" class="fw-bold"></div>

        <div class="clock">
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
            <div class="center-dot"></div>

            <div class="number n12">12</div>
            <div class="number n3">3</div>
            <div class="number n6">6</div>
            <div class="number n9">9</div>
        </div>
    </div>
</div>

<div class="row">

    <!-- ДОХОД -->
    <div class="col-md-4">
        <div class="card p-3 shadow-sm">
            <h5 class="text-success">Доход</h5>
            <h3 th:text="${income}"></h3>

            <form method="post" action="/add">
                <input type="hidden" name="userId" th:value="${userId}"/>
                <input class="form-control mb-2" type="number" name="amount" placeholder="Сумма" required>
                <input type="hidden" name="type" value="INCOME">

                <select class="form-select mb-2" name="category">
                    <option th:each="c : ${incomeCategories}" th:value="${c}" th:text="${c}"></option>
                </select>

                <select class="form-select mb-2" name="wallet">
                    <option th:each="w : ${wallets}" th:value="${w}" th:text="${w}"></option>
                </select>

                <input class="form-control mb-2" name="description" placeholder="Описание">

                <button class="btn btn-success w-100">+ Добавить</button>
            </form>
        </div>
    </div>

    <!-- БАЛАНС -->
    <div class="col-md-4">
        <div class="card p-3 shadow-sm text-center">
            <h5>Баланс</h5>
            <h1 th:text="${balance}"></h1>
        </div>

        <div class="mt-3" th:each="e : ${walletBalances}">
            <div class="d-flex justify-content-between">
                <span th:text="${e.key}"></span>
                <strong th:text="${e.value}"></strong>
            </div>
        </div>

        <form method="post" action="/add-wallet" class="d-flex gap-2 mt-3">
            <input type="hidden" name="userId" th:value="${userId}"/>
            <input type="text" name="wallet" class="form-control" placeholder="Новый кошелек" required>
            <button class="btn btn-primary">+</button>
        </form>
    </div>

    <!-- РАСХОД -->
    <div class="col-md-4">
        <div class="card p-3 shadow-sm">
            <h5 class="text-danger">Расход</h5>
            <h3 th:text="${expense}"></h3>

            <form method="post" action="/add">
                <input type="hidden" name="userId" th:value="${userId}"/>
                <input class="form-control mb-2" type="number" name="amount" placeholder="Сумма" required>
                <input type="hidden" name="type" value="EXPENSE">

                <select class="form-select mb-2" name="category">
                    <option th:each="c : ${expenseCategories}" th:value="${c}" th:text="${c}"></option>
                </select>

                <select class="form-select mb-2" name="wallet">
                    <option th:each="w : ${wallets}" th:value="${w}" th:text="${w}"></option>
                </select>

                <input class="form-control mb-2" name="description" placeholder="Описание">

                <button class="btn btn-danger w-100">+ Добавить</button>
            </form>
        </div>
    </div>

</div>

<hr class="mt-5">

<!-- ИСТОРИЯ -->
<div class="card p-3 shadow-sm">
    <h5>📊 История операций</h5>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Дата</th>
            <th>Описание</th>
            <th>Категория</th>
            <th>Тип</th>
            <th>Сумма</th>
            <th>Кошелек</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="t : ${transactions}">
            <td th:text="${#temporals.format(t.date, 'dd.MM.yyyy HH:mm')}"></td>
            <td th:text="${t.description}"></td>
            <td th:text="${t.category}"></td>
            <td th:text="${t.type}"
                th:classappend="${t.type == 'INCOME'} ? 'text-success' : 'text-danger'"></td>
            <td th:text="${t.amount}"></td>
            <td th:text="${t.wallet}"></td>
        </tr>
        </tbody>
    </table>
</div>

<!-- ЧАСЫ -->
<script>
    function updateClock() {
        const now = new Date();

        const sec = now.getSeconds();
        const min = now.getMinutes();
        const hour = now.getHours();

        document.getElementById("second").style.transform =
            `translateX(-50%) rotate(${sec * 6}deg)`;

        document.getElementById("minute").style.transform =
            `translateX(-50%) rotate(${min * 6}deg)`;

        document.getElementById("hour").style.transform =
            `translateX(-50%) rotate(${(hour % 12) * 30 + min * 0.5}deg)`;

        document.getElementById("date").innerText =
            now.toLocaleDateString('ru-RU');
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
