<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<h3 class="mb-4">Выбор пользователя</h3>

<form method="post" action="/login">

    <!-- 🔽 список пользователей -->
    <select class="form-select mb-3" name="username" required>
        <option value="" disabled selected>Выбери пользователя</option>
        <option th:each="u : ${users}"
                th:value="${u.username}"
                th:text="${u.username}">
        </option>
    </select>

    <!-- 🔑 пароль -->
    <input class="form-control mb-3"
           type="password"
           name="password"
           placeholder="Пароль"
           required>

    <button class="btn btn-primary w-100">Войти</button>

</form>

<a href="/register" class="btn btn-outline-secondary mt-3 w-100">
    Регистрация
</a>

</body>
</html>
